<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8 Наурыз - Мерекелік шақыру</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&family=Playfair+Display:ital,wght@0,700;1,700&family=Caveat:wght@700&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Montserrat', sans-serif;
            background: #fff5f7;
            overflow-x: hidden;
        }

        #intro-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #ff85a2 0%, #fbb1bd 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 1s ease, visibility 1s;
        }

        .envelope-icon {
            font-size: 5rem;
            margin-bottom: 2rem;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .open-btn {
            background: white;
            color: #ff1a75;
            padding: 15px 40px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1.2rem;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
        }

        .open-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 25px rgba(0,0,0,0.15);
        }

        .main-content {
            opacity: 0;
            transition: opacity 1.5s ease;
            padding: 20px;
        }

        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: linear-gradient(135deg, #fff5f7 0%, #ffe0e9 100%);
        }

        .glass-container {
            max-width: 650px;
            margin: 40px auto;
            position: relative;
        }

        .card {
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.7);
            border-radius: 60px;
            padding: 3rem 2rem;
            box-shadow: 0 30px 60px -15px rgba(255, 105, 180, 0.15);
            text-align: center;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.2rem, 8vw, 3.5rem);
            line-height: 1.1;
            background: linear-gradient(45deg, #d81b60, #f06292);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1.5rem;
            font-weight: 700;
        }

        .hero-img {
            width: 100%;
            max-height: 480px;
            object-fit: cover;
            border-radius: 40px;
            border: 8px solid white;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
            margin: 2rem 0;
        }

        .date-badge {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin: 2rem 0;
        }

        .badge-item {
            background: white;
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: 700;
            color: #d81b60;
            box-shadow: 0 4px 15px rgba(216, 27, 96, 0.1);
            font-size: 0.9rem;
        }

        .signature {
            font-family: 'Caveat', cursive;
            font-size: clamp(2rem, 6vw, 2.8rem);
            color: #c2185b;
            margin-top: 2rem;
        }

        #music-control {
            position: fixed;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 2000;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            padding: 12px;
            border-radius: 50px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            cursor: pointer;
            display: none;
            border: 1px solid rgba(255, 105, 180, 0.3);
        }

        .floating-flower {
            position: absolute;
            pointer-events: none;
            z-index: -1;
            opacity: 0.5;
        }

        @keyframes drift {
            from { transform: translateY(100vh) rotate(0deg); }
            to { transform: translateY(-10vh) rotate(360deg); }
        }
    </style>
</head>
<body>

    <div id="intro-overlay">
        <div class="envelope-icon">📩</div>
        <h2 class="text-white text-2xl font-bold mb-8 font-serif">Бұл хат сізге арналған...</h2>
        <button class="open-btn" onclick="startApp()">Ашу</button>
    </div>

    <div id="music-control" onclick="toggleMusic()">
        <span id="music-icon" class="text-xl">🎵</span>
    </div>

    <audio id="bg-music" loop>
        <source src="https://github.com/kingbrawllove/nauryz8.github.io/raw/refs/heads/main/lv_0_20260228134954.m4a" type="audio/mp4">
    </audio>

    <div class="main-content" id="main-content">
        <div class="animated-bg" id="bg-canvas"></div>

        <div class="glass-container">
            <div class="card">
                <span class="text-pink-400 text-5xl mb-4 block">🌸</span>
                <p class="uppercase tracking-widest text-pink-500 font-bold text-xs mb-4">Мерекелік шақыру</p>
                
                <h1>Аяулы қыздар!</h1>
                
                <p class="text-gray-600 leading-relaxed text-lg mb-6">
                    Сіздерді келе жатқан көктемнің ең шуақты мерекесі — <span class="font-bold text-pink-500">8 наурыз</span> күнімен құттықтаймыз! Сыныбымыздың әр күнін нұрға бөлейтін күлкілеріңіз бен мейірімдеріңіз үшін алғыс айтамыз.
                </p>

                <img src="https://raw.githubusercontent.com/kingbrawllove/nauryz8.github.io/refs/heads/main/IMG-20260305-WA0000.jpg" 
                     alt="8 наурыз" 
                     class="hero-img">

                <div class="date-badge">
                    <div class="badge-item">📅 10 Наурыз</div>
                    <div class="badge-item">⏰ 19:37</div>
                    <div class="badge-item">📍 Рауда кафесі</div>
                </div>

                <div class="mt-8 pt-8 border-t border-pink-100">
                    <span class="signature">11 "А" ұлдарының атынан</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const music = document.getElementById('bg-music');
        const musicControl = document.getElementById('music-control');
        const musicIcon = document.getElementById('music-icon');
        let isPlaying = false;

        function startApp() {
            document.getElementById('intro-overlay').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('intro-overlay').style.visibility = 'hidden';
                document.getElementById('main-content').style.opacity = '1';
                musicControl.style.display = 'block';
                
                music.play().then(() => {
                    isPlaying = true;
                    musicIcon.textContent = '🎵';
                }).catch(e => {
                    console.log("Audio play blocked");
                });
            }, 1000);
            
            initFlowers();
        }

        function toggleMusic() {
            if (isPlaying) {
                music.pause();
                musicIcon.textContent = '🔇';
            } else {
                music.play();
                musicIcon.textContent = '🎵';
            }
            isPlaying = !isPlaying;
        }

        function initFlowers() {
            const canvas = document.getElementById('bg-canvas');
            const items = ['🌸', '🌷', '✨', '💖', '🌼'];
            
            for(let i = 0; i < 20; i++) {
                const el = document.createElement('div');
                el.className = 'floating-flower';
                el.textContent = items[Math.floor(Math.random() * items.length)];
                el.style.left = Math.random() * 100 + 'vw';
                el.style.top = Math.random() * 100 + 'vh';
                el.style.fontSize = (Math.random() * 20 + 10) + 'px';
                
                const duration = Math.random() * 15 + 10;
                el.style.animation = `drift ${duration}s linear infinite`;
                el.style.animationDelay = `-${Math.random() * duration}s`;
                
                canvas.appendChild(el);
            }
        }

        document.addEventListener('touchstart', function() {
            if(window.introStarted && !isPlaying) {
                music.play();
                isPlaying = true;
            }
        }, {once: true});
    </script>
</body>
</html>
